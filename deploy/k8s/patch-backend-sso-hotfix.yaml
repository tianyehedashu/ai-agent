spec:
  template:
    spec:
      containers:
        - name: backend
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: workspace
              mountPath: /app/workspace
            - name: sso-hotfix
              mountPath: /app/domains/identity/infrastructure/auth/giikin_session_cookie.py
              subPath: giikin_session_cookie.py
            - name: sso-hotfix
              mountPath: /app/domains/identity/infrastructure/auth/giikin_gateway.py
              subPath: giikin_gateway.py
            - name: sso-hotfix
              mountPath: /app/domains/identity/application/principal_service.py
              subPath: principal_service.py
            - name: sso-hotfix
              mountPath: /app/bootstrap/config.py
              subPath: config.py
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: backend-data-pvc
        - name: workspace
          persistentVolumeClaim:
            claimName: backend-workspace-pvc
        - name: sso-hotfix
          configMap:
            name: ai-agent-sso-hotfix
