# giikin-auth-bridge — HiGress WasmPlugin（ai-agent API 鉴权）
#
# 线上路由由 HiGress 控制台创建，Ingress 名为 ai-agent-api（namespace test）。
# 镜像：正式目标 ACR prod/giikin-auth-bridge:1.0.0；集群 pull Secret 无 push 权限时
# 可临时用 ttl.sh（见 push-wasm-docker.sh / 本地 docker push ttl.sh/giikin-auth-bridge:24h）。
#
# 手动应用前替换 REPLACE_WITH_IAM_REDIS_PASSWORD（IAM 会话 Redis，非 ai-agent 应用 Redis）。
---
apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: giikin-auth-bridge-ai-agent
  namespace: test
  labels:
    higress.io/resource-definer: higress
spec:
  priority: 200
  phase: AUTHN
  failStrategy: FAIL_OPEN
  url: oci://ttl.sh/giikin-auth-bridge:24h
  defaultConfigDisable: true
  # 当前线上 /ai-agent/api/* 实际命中 ai-agent-spa（frontend nginx 再反代 backend），
  # 故 spa 与 api 均需绑定 auth-bridge；仅绑 api 在现有路由优先级下不会生效。
  matchRules:
    - ingress:
        - ai-agent-api
        - ai-agent-spa
      configDisable: false
      config:
        internal_key: "mvp-test-internal-key-2026"
        session_cookie_name: "guard_token"
        audit_enabled: false
        redis:
          service_name: "iam-session-redis.dns"
          service_port: 6379
          username: "test_giimall_redis"
          password: "REPLACE_WITH_IAM_REDIS_PASSWORD"
          database: 0
          timeout: 2000
