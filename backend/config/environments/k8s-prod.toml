# =============================================================================
# K8s 生产环境模板
# =============================================================================
# Pod 内无 docker CLI，使用 local 模式；工作目录与 Deployment volumeMount 一致。
#
# 使用方式：Agent 配置 extends = "k8s-prod"
# 或 Secret 设置 SANDBOX_MODE=local（与 execution.toml 环境变量替换一致）

[metadata]
name = "k8s-prod"
description = "K8s 生产 - 无 Docker 隔离，在 backend Pod 内执行代码工具"
tags = ["k8s", "production"]

extends = ""

[sandbox]
mode = "local"
timeout_seconds = 60

[sandbox.docker]
sandbox_enabled = false

[shell]
work_dir = "/app/workspace"
