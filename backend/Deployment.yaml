apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: giimall-acr-registry-vpc.cn-hangzhou.cr.aliyuncs.com/test/ai-agent-backend:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ai-agent-backend-env
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: workspace
              mountPath: /app/workspace

          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "1"
              memory: "4Gi"

          # /health 不查 DB/Redis，仅返回静态 JSON。但突发流量 / Redis 抖动时单核事件循环
          # 可能短暂拥塞，探针超时不宜过紧（见 K8s 调试 Skill）。
          # 分工：readiness 灵敏 —— 拥塞时仅摘流量；liveness 宽松 —— 仅在真正死锁时才重启，
          # 避免高负载下被误杀重启（重启会中断在途请求并引发雪崩）。
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: backend-data-pvc

        - name: workspace
          persistentVolumeClaim:
            claimName: backend-workspace-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: test
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
