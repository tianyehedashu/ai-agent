server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets（含 /ai-agent/ 下资源）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 默认服务级前缀 /ai-agent（与 ROOT_PATH、VITE_APP_ROOT 默认一致）
    location /ai-agent/api/ {
        proxy_pass http://backend:8000/ai-agent/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ai-agent/ {
        try_files $uri $uri/ /ai-agent/index.html;
    }

    location = / {
        return 302 /ai-agent/;
    }

    # 无前缀部署：backend/frontend 均设 ROOT_PATH=、VITE_APP_ROOT=
    # location /api {
    #     proxy_pass http://backend:8000;
    #     ...
    # }
    # location / {
    #     try_files $uri $uri/ /index.html;
    # }
}
