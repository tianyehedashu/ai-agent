server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 默认服务级前缀 /ai-agent（与 ROOT_PATH、VITE_APP_ROOT 默认一致）
    # Vite base=/ai-agent/ 时：dist 文件在 html 根目录，浏览器 URL 带 /ai-agent 前缀，须 rewrite 后再 try_files
    location /ai-agent/api/ {
        proxy_pass http://backend:8000/ai-agent/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # HiGress giikin-auth-bridge 在网关层注入，经 spa 路由反代时须显式转发
        proxy_set_header X-Giikin-User-JSON $http_x_giikin_user_json;
        proxy_set_header X-Giikin-User-Id $http_x_giikin_user_id;
        proxy_set_header X-Giikin-Internal-Key $http_x_giikin_internal_key;
        proxy_set_header X-Giikin-Org-Code $http_x_giikin_org_code;
        proxy_set_header X-Giikin-Shop-Id $http_x_giikin_shop_id;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location ^~ /ai-agent/assets/ {
        rewrite ^/ai-agent/(.*)$ /$1 break;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ^~ /ai-agent/ {
        rewrite ^/ai-agent/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
        # SPA 入口勿长期缓存，避免发版后仍引用已删除的 hash chunk
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = / {
        return 302 /ai-agent/;
    }

    # 无前缀部署：backend/frontend 均设 ROOT_PATH=、VITE_APP_ROOT=
    # location /api/ {
    #     proxy_pass http://backend:8000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 300s;
    #     proxy_buffering off;
    # }
    # location / {
    #     try_files $uri $uri/ /index.html;
    # }
}
