# AI Agent Docker Compose — 生产环境
# 用法: docker compose -f docker-compose.prod.yml --env-file .env.production up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  # ─── Infrastructure ─────────────────────────────────────────
  db:
    image: ${REGISTRY_PREFIX:-}postgres:15-alpine
    container_name: ai-agent-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [ai-agent-network]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
    logging: *default-logging

  redis:
    image: ${REGISTRY_PREFIX:-}redis:7-alpine
    container_name: ai-agent-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks: [ai-agent-network]
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-agent-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [ai-agent-network]
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
    logging: *default-logging

  # ─── Application ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: production
      args:
        BASE_IMAGE: ${BACKEND_BASE_IMAGE:-ai-agent-backend-base:latest}
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: ai-agent-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
      - backend_workspace:/app/workspace
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [ai-agent-network]
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    logging:
      <<: *default-logging
      options:
        max-size: "50m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: ai-agent-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend: { condition: service_healthy }
    networks: [ai-agent-network]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

networks:
  ai-agent-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  backend_data:
  backend_workspace:
